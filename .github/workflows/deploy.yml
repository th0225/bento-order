name: Deploy Bento System to GCP

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 .NET 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: 清理專案
      run: dotnet clean

    - name: 發布專案
      run: dotnet publish -c Release -o ./publish

    - name: 遠端停止服務並清理
      uses: appleboy/ssh-action@master
      with:
        script: |
          sudo systemctl stop bento-order.service
          # 徹底刪除舊的發布資料夾，避免資產衝突
          sudo rm -rf /home/excalibur0225/bento-order/publish
          mkdir -p /home/excalibur0225/bento-order/publish
          sudo chown -R ${{ secrets.GCP_USER }} /home/excalibur0225/bento-order

    - name: 傳送檔案 (SCP)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        source: "publish/*"
        target: "/home/excalibur0225/bento-order/publish"
        strip_components: 1
        rm: true

    - name: 啟動服務
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          sudo systemctl start bento-order.service
