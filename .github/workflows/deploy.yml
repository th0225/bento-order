name: Deploy Bento System to GCP

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 .NET 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: 發布專案
      run: dotnet publish -c Release -o ./publish

    - name: 遠端停止服務並清理 (避免權限與鎖定問題)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          # 1. 停止服務釋放 DLL 鎖定
          sudo systemctl stop bento-order.service
          # 2. 確保目標資料夾存在且權限正確
          mkdir -p /home/excalibur0225/bento-order/publish
          sudo chown -R ${{ secrets.GCP_USER }}:${{ secrets.GCP_USER }} /home/excalibur0225/bento-order

    - name: 傳送檔案 (SCP)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        source: "publish/*"
        target: "/home/excalibur0225/bento-order/publish"
        strip_components: 1
        rm: true

    - name: 啟動服務
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          sudo systemctl start bento-order.service